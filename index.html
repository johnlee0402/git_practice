<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翰翰的自我介紹</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 150px;
            border-radius: 50%;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
        }

        h2 {
            color: #555;
            margin-top: 25px;
        }

        p {
            color: #666;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f0f0f0;
            margin: 5px 0;
            padding: 8px;
            border-radius: 8px;
        }

        .contact a {
            display: inline-block;
            margin: 5px;
            text-decoration: none;
            color: white;
            background: #6c63ff;
            padding: 10px 15px;
            border-radius: 8px;
        }

        .contact a:hover {
            background: #574fd6;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="your-photo.jpg" alt="個人照片">

    <h1>你好，我是翰翰</h1>
    <p>歡迎來到我的個人網站 👋</p>

    <h2>關於我</h2>
    <p>
        我是學生，喜歡打籃球、玩遊戲（第五人格）和看動漫。
        最近正在學習 Python 與 AI，希望未來能成為工程師。
    </p>

    <h2>我的興趣</h2>
    <ul>
        <li>🏀 打籃球</li>
        <li>🎮 玩遊戲</li>
        <li>📺 看動漫</li>
    </ul>

    <h2>技能</h2>
    <ul>
        <li>Python 基礎</li>
        <li>HTML 網頁設計</li>
    </ul>

    <h2>聯絡我</h2>
    <div class="contact">
        <a href="mailto:example@gmail.com">Email</a>
        <a href="#">Instagram</a>
    </div>

</div>

</body>
</html>
